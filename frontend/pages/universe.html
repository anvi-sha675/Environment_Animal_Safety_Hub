<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Universe & Nature</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
:root{
  --primary:#2e7d32;
  --primary-dark:#1b5e20;
  --light-bg:#f1f8f4;
  --card-bg:#ffffff;
  --text:#2d3436;
  --border:#e0e0e0;
  --shadow:0 4px 12px rgba(0,0,0,0.08);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Segoe UI',sans-serif;
  background:linear-gradient(135deg,#e8f5e9,#f1f8f4);
  color:var(--text);
}

/* HEADER */
.header{
  background:var(--primary);
  color:#fff;
  padding:2rem 1rem;
  text-align:center;
  border-bottom-left-radius:40px;
  border-bottom-right-radius:40px;
}

.header h1{
  font-size:2rem;
  font-weight:600;
}

.header p{
  margin-top:0.5rem;
  opacity:0.9;
}

.container{
  max-width:1200px;
  margin:2rem auto;
  padding:0 1.5rem;
}

/* SEARCH + FILTER */
.connection-bar{
  background:#fff;
  padding:1rem;
  border-radius:10px;
  box-shadow:var(--shadow);
  display:flex;
  gap:1rem;
  flex-wrap:wrap;
  margin-bottom:2rem;
}

.search-box{
  flex:1;
  position:relative;
}

.search-box input{
  width:100%;
  padding:0.6rem 1rem 0.6rem 2.5rem;
  border:1px solid var(--border);
  border-radius:6px;
}

.search-box i{
  position:absolute;
  left:10px;
  top:50%;
  transform:translateY(-50%);
  color:#888;
}

select{
  padding:0.6rem 1rem;
  border-radius:6px;
  border:1px solid var(--border);
}

/* FEATURED */
.featured{
  background:#fff;
  padding:2rem;
  border-radius:10px;
  box-shadow:var(--shadow);
  margin-bottom:2rem;
  border:1px solid var(--border);
}

.featured h2{
  color:var(--primary);
  font-size:0.9rem;
  text-transform:uppercase;
}

.featured h3{
  font-size:1.8rem;
  margin:0.5rem 0;
}

.explore-btn{
  background:var(--primary);
  color:#fff;
  border:none;
  padding:0.5rem 1rem;
  border-radius:6px;
  cursor:pointer;
}

.explore-btn:hover{
  background:var(--primary-dark);
}

/* CARDS GRID - 3 PER ROW */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1.5rem;
}

.card{
  background:#fff;
  border-radius:10px;
  border:1px solid var(--border);
  box-shadow:var(--shadow);
  overflow:hidden;
  transition:0.2s ease;
}

.card:hover{
  transform:translateY(-5px);
}

.card-image{
  height:150px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:3rem;
  color:var(--primary);
  background:#f1f8f4;
}

.card-content{
  padding:1rem;
}

.tag{
  background:#e8f5e9;
  color:var(--primary);
  padding:0.3rem 0.7rem;
  border-radius:20px;
  font-size:0.75rem;
  display:inline-block;
  margin-bottom:0.5rem;
}

.card-title{
  font-weight:600;
  margin-bottom:0.5rem;
}

.card-desc{
  font-size:0.85rem;
  margin-bottom:1rem;
}

.connect-btn{
  background:var(--primary);
  color:#fff;
  border:none;
  padding:0.4rem 0.8rem;
  border-radius:6px;
  cursor:pointer;
}

.connect-btn:hover{
  background:var(--primary-dark);
}

/* FOOTER */
.footer{
  margin-top:3rem;
  background:var(--primary-dark);
  color:#fff;
  text-align:center;
  padding:1rem;
}

/* RESPONSIVE */
@media(max-width:992px){
  .grid{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:600px){
  .grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<header class="header">
  <h1>Universe & Nature</h1>
  <p>Exploring the connection between cosmic systems and natural ecosystems</p>
</header>

<div class="container">

  <div class="connection-bar">
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search connections...">
    </div>

    <select id="categoryFilter">
      <option value="all">All Categories</option>
      <option value="stardust">Stardust</option>
      <option value="water">Water</option>
      <option value="light">Light</option>
      <option value="fire">Fire</option>
      <option value="air">Air</option>
      <option value="earth">Earth</option>
    </select>
  </div>

  <div class="featured">
    <h2>Featured Connection</h2>
    <h3>Yggdrasil & The Milky Way</h3>
    <p>The world tree connects every being to the galactic center. A bridge between nature and the cosmos.</p>
    <button class="explore-btn">Explore</button>
  </div>

  <div class="grid" id="cardGrid"></div>

</div>

<footer class="footer">
  © 2026 Eco Awareness Platform | Universe & Nature Module
</footer>

<script>
const connections = [
  { name:"Milky Way & Forest", category:"stardust", desc:"Trees glow with galactic dust.", icon:"fa-tree" },
  { name:"Tides & Moon", category:"water", desc:"Ocean cycles follow lunar phases.", icon:"fa-water" },
  { name:"Aurora & Moss", category:"light", desc:"Northern lights reflect in moss.", icon:"fa-star" },
  { name:"Sun & Sunflower", category:"fire", desc:"Sunflowers track the sun.", icon:"fa-sun" },
  { name:"Bird Migration & Stars", category:"air", desc:"Birds navigate using stars.", icon:"fa-dove" },
  { name:"Stone & Meteorite", category:"earth", desc:"Meteorites link sky and ground.", icon:"fa-meteor" }
];

const grid = document.getElementById("cardGrid");
const searchInput = document.getElementById("searchInput");
const categoryFilter = document.getElementById("categoryFilter");

function renderCards(){
  const searchValue = searchInput.value.toLowerCase();
  const categoryValue = categoryFilter.value;

  const filtered = connections.filter(item => {
    const matchesSearch = item.name.toLowerCase().includes(searchValue);
    const matchesCategory = categoryValue === "all" || item.category === categoryValue;
    return matchesSearch && matchesCategory;
  });

  grid.innerHTML = filtered.map(item => `
    <div class="card">
      <div class="card-image">
        <i class="fas ${item.icon}"></i>
      </div>
      <div class="card-content">
        <span class="tag">${item.category}</span>
        <div class="card-title">${item.name}</div>
        <div class="card-desc">${item.desc}</div>
        <button class="connect-btn">Connect</button>
      </div>
    </div>
  `).join("");
}

searchInput.addEventListener("input", renderCards);
categoryFilter.addEventListener("change", renderCards);

renderCards();
</script>

</body>
</html>
